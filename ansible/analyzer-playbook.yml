---
- name: Install and run analyzer
  hosts: analyzers
  become: true
  vars_files:
    - analyzer-vars.yml

  tasks:
    - name: Install dependencies
      apt:
        name:
          - git
          - docker.io
        state: present
        update_cache: true

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ install_dir }}"
        key_file: "{{ git_key_file }}"
        accept_hostkey: yes
        update: true

    - name: Create env directory
      file:
        path: /etc/analyzer
        state: directory
        owner: root
        group: docker
        mode: '0750'

    - name: Deploy env file
      template:
        src: templates/analyzer.env.j2
        dest: "{{ env_file }}"
        owner: root
        group: docker
        mode: '0640'

    - name: Build Docker image
      community.docker.docker_image:
        name: analyzer
        build:
          path: "{{ install_dir }}"
          dockerfile: analyzer/Dockerfile
        source: build
        force_source: true

    - name: Deploy systemd service
      template:
        src: templates/analyzer.service.j2
        dest: /etc/systemd/system/analyzer.service

    - name: Enable and start service
      systemd:
        name: analyzer
        enabled: true
        state: started
        daemon_reload: true
