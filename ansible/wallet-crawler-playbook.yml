---
- name: Install and run wallet crawler
  hosts: wallet-crawlers
  become: true
  vars_files:
    - wallet-crawler-vars.yml

  tasks:
    - name: Install dependencies
      apt:
        name:
          - git
          - docker.io
        state: present
        update_cache: true

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ install_dir }}"
        key_file: "{{ git_key_file }}"
        accept_hostkey: yes
        update: true

    - name: Initialize git submodules
      command: git submodule update --init --recursive
      args:
        chdir: "{{ install_dir }}"

    - name: Create env directory
      file:
        path: /etc/wallet-crawler
        state: directory
        owner: root
        group: docker
        mode: '0750'

    - name: Deploy env file
      template:
        src: templates/wallet-crawler.env.j2
        dest: "{{ env_file }}"
        owner: root
        group: docker
        mode: '0640'

    - name: Deploy MetaMask credentials
      copy:
        src: "{{ metamask_credentials_src | default('../Web3-Privacy/framework/request-interceptor/metamask_credentials.json') }}"
        dest: "{{ credentials_file }}"
        owner: root
        group: docker
        mode: '0640'

    - name: Build Docker image
      community.docker.docker_image:
        name: wallet-crawler
        build:
          path: "{{ install_dir }}/Web3-Privacy/framework/request-interceptor"
        source: build
        force_source: true

    - name: Deploy systemd service
      template:
        src: templates/wallet-crawler.service.j2
        dest: /etc/systemd/system/wallet-crawler.service

    - name: Enable and start service
      systemd:
        name: wallet-crawler
        enabled: true
        state: started
        daemon_reload: true
